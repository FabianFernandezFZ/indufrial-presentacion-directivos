<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

body {
  font-family: 'Inter', sans-serif;
  color: white;
  display: flex;
  align-items: center;
  padding: 72px;
  box-sizing: border-box;
  background:
    linear-gradient(90deg, rgba(4,8,18,0.88) 0%, rgba(4,8,18,0.62) 38%, rgba(4,8,18,0.22) 100%),
    url("slide%201.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.container {
  max-width: 820px;
}

.eyebrow {
  display: inline-block;
  margin-bottom: 22px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: rgba(255,255,255,.68);
}

h1 {
  margin: 0;
  font-size: 72px;
  font-weight: 900;
  line-height: .98;
  letter-spacing: -0.04em;
  color: #F4F7FB;
}

.line-soft {
  color: rgba(244,247,251,.78);
  font-weight: 700;
}

.line-strong {
  color: #FFFFFF;
  font-weight: 900;
}

p {
  margin-top: 26px;
  max-width: 640px;
  font-size: 24px;
  line-height: 1.4;
  color: rgba(255,255,255,.78);
}

.bar {
  width: 84px;
  height: 6px;
  border-radius: 999px;
  margin: 0 0 28px 0;
  background: linear-gradient(90deg, #ffffff, rgba(255,255,255,.35));
}

@media (max-width: 1100px) {
  body {
    padding: 48px;
  }

  h1 {
    font-size: 58px;
  }

  p {
    font-size: 20px;
  }
}

@media (max-width: 720px) {
  body {
    padding: 28px;
    align-items: flex-end;
  }

  .container {
    max-width: 100%;
  }

  h1 {
    font-size: 42px;
  }

  p {
    font-size: 18px;
  }
}
</style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">Canal digital Indufrial</div>
    <div class="bar"></div>

    <h1>
      Capturar demanda<br>
      <span class="line-strong">que hoy se pierde</span><br>
      <span class="line-soft">sin cambiar el modelo actual</span>
    </h1>

    <p>
      Propuesta de canal digital para reducir fricción comercial, acelerar el cierre y capturar demanda no atendida.
    </p>
  </div>
</body>
</html>
